<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Treino de Mira 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, target, raycaster, mouse, intersects;
        let movementSpeed = 0.1;  // Velocidade de movimentação no chão
        let cameraRotationSpeed = 0.002;  // Velocidade de rotação da câmera
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let isMouseDown = false; // Controla quando o mouse está pressionado para evitar giros instantâneos

        let horizontalRotation = 0; // Controla a rotação horizontal (eixo Y)
        let verticalRotation = 0;  // Controla a rotação vertical (eixo X)

        function init() {
            // Criar a cena
            scene = new THREE.Scene();

            // Criar a câmera (campo de visão, aspecto, plano de corte)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Criar o renderizador e adicionar à página
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Criar uma esfera para o alvo
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            target = new THREE.Mesh(geometry, material);
            target.position.set(0, 0, -5);  // Coloca o alvo à frente da câmera
            scene.add(target);

            // Criar um chão para movimentação
            const groundGeometry = new THREE.PlaneGeometry(500, 500);
            const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = Math.PI / 2;  // Rotaciona o chão para que ele fique plano
            scene.add(ground);

            // Criar o raycaster e o vetor de mouse
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Adicionar eventos de teclado e mouse
            window.addEventListener('keydown', onKeyDown, false);
            window.addEventListener('keyup', onKeyUp, false);
            window.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('mousedown', onMouseDown, false);
            window.addEventListener('mouseup', onMouseUp, false);

            // Ajustar a cena quando a janela for redimensionada
            window.addEventListener('resize', onWindowResize, false);

            // Definir a posição inicial da câmera
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);  // A câmera começa olhando para o centro da cena

            // Iniciar animação
            animate();
        }

        function onMouseMove(event) {
            if (!isMouseDown) return;  // Evita que a rotação aconteça quando o mouse não está pressionado

            // Atualiza as coordenadas do mouse com base na posição da tela
            horizontalRotation -= event.movementX * cameraRotationSpeed; // Movimentação no eixo Y (esquerda/direita)
            verticalRotation -= event.movementY * cameraRotationSpeed; // Movimentação no eixo X (cima/baixo)

            // Limita a rotação vertical para evitar que a câmera vire completamente
            verticalRotation = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, verticalRotation));
        }

        function onMouseDown() {
            isMouseDown = true;
        }

        function onMouseUp() {
            isMouseDown = false;
        }

        function onKeyDown(event) {
            // Controla a movimentação com as teclas W, A, S, D
            if (event.key === 'w') {
                moveForward = true;
            } else if (event.key === 's') {
                moveBackward = true;
            } else if (event.key === 'a') {
                moveLeft = true;
            } else if (event.key === 'd') {
                moveRight = true;
            }
        }

        function onKeyUp(event) {
            // Para a movimentação quando as teclas são soltas
            if (event.key === 'w') {
                moveForward = false;
            } else if (event.key === 's') {
                moveBackward = false;
            } else if (event.key === 'a') {
                moveLeft = false;
            } else if (event.key === 'd') {
                moveRight = false;
            }
        }

        function onWindowResize() {
            // Atualiza a proporção da câmera e o tamanho do renderizador
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Atualiza o raycaster com a posição do mouse
            raycaster.update(camera.position, mouse);

            // Verificar se o raycast atingiu o alvo
            intersects = raycaster.intersectObject(target);
            if (intersects.length > 0) {
                target.material.color.set(0x00ff00);  // Muda a cor para verde quando o alvo é atingido
            } else {
                target.material.color.set(0xff0000);  // Caso contrário, mantém a cor vermelha
            }

            // Movimenta o alvo de forma simples ao longo do eixo X
            target.position.x = Math.sin(Date.now() * 0.001) * 5;

            // Aplica as rotações com base nos valores calculados
            camera.rotation.y = horizontalRotation; // Rotação horizontal (gira para os lados)
            camera.rotation.x = verticalRotation; // Rotação vertical (olha para cima/baixo)

            // Movimentação no chão (W, A, S, D)
            if (moveForward) {
                camera.position.z -= movementSpeed;
            }
            if (moveBackward) {
                camera.position.z += movementSpeed;
            }
            if (moveLeft) {
                camera.position.x -= movementSpeed;
            }
            if (moveRight) {
                camera.position.x += movementSpeed;
            }

            // Renderizar a cena
            renderer.render(scene, camera);
        }

        // Iniciar o jogo
        init();
    </script>
</body>
</html>
