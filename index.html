<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FPS Treino de Mira</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#hud{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:22px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:30px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="hud">Score: 0</div>
<div id="crosshair">+</div>
<div id="start">Clique para jogar</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let controls = new THREE.PointerLockControls(camera,document.body)

document.getElementById("start").onclick=()=>{
controls.lock()
document.getElementById("start").style.display="none"
}

scene.add(controls.getObject())

camera.position.y = 1.6

// chão
let floorGeo = new THREE.PlaneGeometry(200,200)
let floorMat = new THREE.MeshBasicMaterial({color:0x333333})
let floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

// alvos
let targets=[]
let score=0

function spawnTarget(){

let g = new THREE.SphereGeometry(0.5)
let m = new THREE.MeshBasicMaterial({color:0xff0000})
let target = new THREE.Mesh(g,m)

target.position.x=(Math.random()-0.5)*20
target.position.y=1+Math.random()*3
target.position.z=(Math.random()-0.5)*20

scene.add(target)
targets.push(target)

}

for(let i=0;i<8;i++) spawnTarget()

// tiro
let raycaster = new THREE.Raycaster()

window.addEventListener("click",()=>{

raycaster.setFromCamera({x:0,y:0},camera)

let hits = raycaster.intersectObjects(targets)

if(hits.length>0){

let hit = hits[0].object
scene.remove(hit)

targets.splice(targets.indexOf(hit),1)

score++
document.getElementById("hud").innerText="Score: "+score

spawnTarget()

}

})

// movimento
let forward=false
let backward=false
let left=false
let right=false

document.addEventListener("keydown",(e)=>{

if(e.code==="KeyW") forward=true
if(e.code==="KeyS") backward=true
if(e.code==="KeyA") left=true
if(e.code==="KeyD") right=true

})

document.addEventListener("keyup",(e)=>{

if(e.code==="KeyW") forward=false
if(e.code==="KeyS") backward=false
if(e.code==="KeyA") left=false
if(e.code==="KeyD") right=false

})

function animate(){

requestAnimationFrame(animate)

let speed=0.1

if(forward) controls.moveForward(speed)
if(backward) controls.moveForward(-speed)
if(left) controls.moveRight(-speed)
if(right) controls.moveRight(speed)

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
