<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Treino de Mira 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, target, raycaster, mouse, intersects;

        function init() {
            // Criar a cena
            scene = new THREE.Scene();

            // Criar a câmera (campo de visão, aspecto, plano de corte)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // Criar o renderizador e adicionar à página
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Criar uma esfera para o alvo
            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            target = new THREE.Mesh(geometry, material);
            target.position.set(0, 0, -5);  // Coloca o alvo à frente da câmera
            scene.add(target);

            // Criar o raycaster e o vetor de mouse
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Adicionar evento de movimento do mouse
            window.addEventListener('mousemove', onMouseMove, false);

            // Ajustar a cena quando a janela for redimensionada
            window.addEventListener('resize', onWindowResize, false);

            // Definir a posição inicial da câmera
            camera.position.z = 10;

            // Iniciar animação
            animate();
        }

        function onMouseMove(event) {
            // Atualiza as coordenadas do mouse com base na posição da tela
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            // Atualiza a proporção da câmera e o tamanho do renderizador
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Atualiza o raycaster com a posição do mouse
            raycaster.update(camera.position, mouse);

            // Verificar se o raycast atingiu o alvo
            intersects = raycaster.intersectObject(target);
            if (intersects.length > 0) {
                target.material.color.set(0x00ff00);  // Muda a cor para verde quando o alvo é atingido
            } else {
                target.material.color.set(0xff0000);  // Caso contrário, mantém a cor vermelha
            }

            // Movimenta o alvo de forma simples ao longo do eixo X
            target.position.x = Math.sin(Date.now() * 0.001) * 5;

            // Renderizar a cena
            renderer.render(scene, camera);
        }

        // Iniciar o jogo
        init();
    </script>
</body>
</html>
